<html>
  <body style="font-family: sans-serif; color: #1a1a1a; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h2 style="font-size: 18px;">Confirme seu e-mail</h2>
    <p>Sua conta no DeskcommCRM está quase pronta. Clique no botão abaixo para confirmar seu e-mail e ativar sua conta:</p>
    <p style="margin: 24px 0;">
      <a
        href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=signup"
        style="background: #4a5d52; color: #ffffff; padding: 10px 20px; border-radius: 6px; text-decoration: none; display: inline-block;"
        >Confirmar e-mail</a
      >
    </p>
    <p style="font-size: 12px; color: #666;">Se você não criou esta conta, ignore este e-mail.</p>
  </body>
</html>
