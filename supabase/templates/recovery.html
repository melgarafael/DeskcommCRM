<html>
  <body style="font-family: sans-serif; color: #1a1a1a; max-width: 480px; margin: 0 auto; padding: 24px;">
    <h2 style="font-size: 18px;">Redefinir senha</h2>
    <p>Recebemos um pedido para redefinir a senha da sua conta no DeskcommCRM. Clique no botão abaixo para escolher uma nova senha:</p>
    <p style="margin: 24px 0;">
      <a
        href="{{ .RedirectTo }}?token_hash={{ .TokenHash }}&type=recovery"
        style="background: #4a5d52; color: #ffffff; padding: 10px 20px; border-radius: 6px; text-decoration: none; display: inline-block;"
        >Redefinir senha</a
      >
    </p>
    <p style="font-size: 12px; color: #666;">Se você não pediu a redefinição, ignore este e-mail — sua senha atual continua valendo.</p>
  </body>
</html>
